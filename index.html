<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA | ALONE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131a2c;
            --bg-input: #070a12;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --accent: #60a5fa;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1e293b;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: rgba(19, 26, 44, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to left, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .container {
            max-width: 1400px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1.5rem;
            flex: 1;
        }

        .sidebar {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .option-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .option-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
            margin-top: 2px;
        }

        .option-info {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .option-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .option-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .btn-obfuscate {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-obfuscate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        
        .workspace {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 1.5rem;
            min-height: 650px;
        }

        .editor-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .editor-header {
            background: rgba(7, 10, 18, 0.4);
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .editor-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        .editor-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-action {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:hover {
            border-color: var(--primary);
            background: var(--border);
        }

        textarea {
            width: 100%;
            height: 100%;
            flex: 1;
            background-color: var(--bg-input);
            border: none;
            color: #34d399;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.95rem;
            padding: 1.25rem;
            resize: none;
            outline: none;
            line-height: 1.5;
            tab-size: 4;
        }

        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 10;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(300deg); }
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">H</div>
            <div class="logo-text">
                <h1>SA | OBFUSCATOR</h1>
                <p>discord.gg/eS4fgMazxy</p>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div>
                <div class="section-title">إعدادات التشفير (يفضل تتركها زي ما هي)</div>
                <div class="option-group">
                    <label class="option-item">
                        <input type="checkbox" id="param-vm" checked>
                        <div class="option-info">
                            <span class="option-name">Virtual Machine (VM)</span>
                            <span class="option-desc">تحويل الكود إلى بيئة Bytecode افتراضية مغلقة لمنع التفكيك.</span>
                        </div>
                    </label>

                    <label class="option-item">
                        <input type="checkbox" id="param-antitamper" checked>
                        <div class="option-info">
                            <span class="option-name">Anti-Tamper & Beautify</span>
                            <span class="option-desc">منع التلاعب بالملف أو إعادة ترتيب أسطره وفك محاذاته.</span>
                        </div>
                    </label>

                    <label class="option-item">
                        <input type="checkbox" id="param-controlflow" checked>
                        <div class="option-info">
                            <span class="option-name">Control Flow Obfuscation</span>
                            <span class="option-desc">تشتيت البنية البرمجية عبر إدخال خوارزميات توجيه وهمية.</span>
                        </div>
                    </label>

                    <label class="option-item">
                        <input type="checkbox" id="param-garbage" checked>
                        <div class="option-info">
                            <span class="option-name">Garbage Code Insertion</span>
                            <span class="option-desc">حقن أسطر برمجية عشوائية لا تؤثر على الأداء ولكنها تعمي المخترق.</span>
                        </div>
                    </label>

                    <label class="option-item">
                        <input type="checkbox" id="param-renaming" checked>
                        <div class="option-info">
                            <span class="option-name">Variable Renaming</span>
                            <span class="option-desc">تغيير أسماء المتغيرات والدوال الأصلية إلى رموز مشفرة وطويلة.</span>
                        </div>
                    </label>

                    <label class="option-item">
                        <input type="checkbox" id="param-compressor" checked>
                        <div class="option-info">
                            <span class="option-name">Code Compressor</span>
                            <span class="option-desc">ضغط الكود النهائي وإزالة المساحات الفارغة الزائدة.</span>
                        </div>
                    </label>
                </div>
            </div>

            <button class="btn-obfuscate" onclick="processObfuscation()">
                ⚡ تشفير السكريبت الآن
            </button>
        </aside>

        <main class="workspace">
            <div class="editor-container">
                <div class="editor-header">
                    <div class="editor-label">الكود الأصلي (Source Code)</div>
                    <div class="editor-actions">
                        <button class="btn-action" onclick="document.getElementById('input-code').value=''">تنظيف</button>
                    </div>
                </div>
                <textarea id="input-code" placeholder="-- ضع سكريبت Lua الخاص بك هنا ليتم حمايته وتشفيره عبر  SA | OBFSCATOR..." spellcheck="false"></textarea>
            </div>

            <div class="editor-container">
                <div class="loading-overlay" id="loading-view">
                    <div class="spinner"></div>
                    <p style="font-weight: 500; font-size: 0.95rem;">جاري معالجة ...</p>
                </div>
                <div class="editor-header">
                    <div class="editor-label" style="color: var(--success);">الكود المشفر الناتج (Obfuscated Code)</div>
                    <div class="editor-actions" id="output-actions" style="display: none;">
                        <button class="btn-action" style="border-color: var(--success); color: var(--success);" onclick="copyToClipboard()">نسخ الكود</button>
                    </div>
                </div>
                <textarea id="output-code" placeholder="-- سيظهر هنا الكود المحمي والمبني عبر الـ Bytecode بعد الضغط على التشفير..." readonly spellcheck="false" style="color: #60a5fa;"></textarea>
            </div>
        </main>
    </div>

    <footer>
        <p>© 2026 تم تطوير الواجهة البرمجية بواسطة SA | ALONE</p>
    </footer>

    <script>
        function processObfuscation() {
            const input = document.getElementById('input-code').value.trim();
            if (!input) {
                alert('الرجاء إدخال سكربت Lua أولاً حتى نتمكن من تشفيره!');
                return;
            }

            const loading = document.getElementById('loading-view');
            const actions = document.getElementById('output-actions');
            const outputArea = document.getElementById('output-code');

            
            loading.classList.add('active');

           
            fetch('/obfuscate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    code: input,
                    settings: {
                        vm: document.getElementById('param-vm').checked,
                        antitamper: document.getElementById('param-antitamper').checked,
                        controlflow: document.getElementById('param-controlflow').checked,
                        garbage: document.getElementById('param-garbage').checked,
                        renaming: document.getElementById('param-renaming').checked,
                        compressor: document.getElementById('param-compressor').checked
                    }
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('حدث خطأ أثناء معالجة التشفير في السيرفر');
                return response.json();
            })
            .then(data => {
                
                outputArea.value = data.obfuscated;
                loading.classList.remove('active');
                actions.style.display = 'flex';
                outputArea.scrollTo({top: 0, behavior: 'smooth'});
            })
            .catch(err => {
                loading.classList.remove('active');
                alert(err.message || 'فشلت عملية الاتصال بالسيرفر، تأكد من إعدادات الرفع.');
            });
        }

        function copyToClipboard() {
            const outputArea = document.getElementById('output-code');
            outputArea.select();
            document.execCommand('copy');
            alert('تم نسخ الكود المشفر بنجاح إلى الحافظة!');
        }
    </script>
</body>
</html>
